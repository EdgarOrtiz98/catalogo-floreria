<app-navbar-admin></app-navbar-admin>
<div class="admin-dashboard">
  <!-- <header class="admin-header">
    <h1 class="admin-title">Panel de Administración - Daniel Maglioni</h1>
  </header> -->

  <main class="admin-content">
    <section class="admin-card flor-card">
      <h2 class="card-title">Registrar Nueva Flor</h2>
      <form [formGroup]="florForm" (ngSubmit)="onSaveFlor()" class="admin-form">
        
        <div class="form-group">
          <label for="flor-nombre" class="form-label">Nombre de la flor</label>
          <input type="text" id="flor-nombre" formControlName="nombre" placeholder="Ej: Flores amarillas" class="form-input">
        </div>

        <div class="form-group">
          <label for="flor-desc" class="form-label">Descripción del arreglo</label>
          <textarea id="flor-desc" formControlName="descripcion" placeholder="Describe el arreglo floral..." class="form-textarea"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group col-half">
            <label for="flor-precio" class="form-label">Precio ($MXN)</label>
            <input type="number" id="flor-precio" formControlName="precio" placeholder="1099.00" class="form-input">
          </div>

          <div class="form-group col-half">
            <label for="flor-descuento" class="form-label">Descuento (%)</label>
            <input type="number" id="flor-descuento" formControlName="descuento" placeholder="0" class="form-input" min="0" max="100">
          </div>
        </div>

        <div class="form-group" style="margin-top: 1.8rem;">
          <label for="flor-cat" class="form-label">Categoría</label>
          <select id="flor-cat" formControlName="id_categoria" class="form-input form-select">
            <option value="">Selecciona una categoría</option>
            <option *ngFor="let cat of categorias" [value]="cat.id_categoria">
              {{ cat.nombre }}
            </option>
          </select>
        </div>

        <div class="form-group file-group">
          <label for="flor-foto" class="form-label file-label">
            <span class="file-icon">&#x1F4F7;</span>
            <span class="file-text">Subir Foto del producto (JPG, PNG)</span>
          </label>
          <input type="file" id="flor-foto" (change)="onFileSelected($event)" accept="image/*" class="form-file-input">
        </div>

        <button type="submit" [disabled]="florForm.invalid || !archivoSeleccionado || cargando" class="btn btn-primary">
          <span class="btn-icon">&#10004;</span>
          <span class="btn-text">
            {{ cargando ? 'Guardando...' : 'Publicar en Catálogo' }}
          </span>
        </button>
      </form>
    </section>

    <!-- Flores Guardadas List Table -->
    <section class="admin-card">
      <h2 class="card-title">Flores Guardadas</h2>
      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <!-- <th>ID</th> -->
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Descuento</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let flor of flores">
              <!-- <td>{{ flor.id }}</td> -->
              <td>
                <img *ngIf="flor.imagen_url" [src]="flor.imagen_url" alt="{{ flor.nombre }}" class="table-img-thumb" style="width:50px; height:50px; object-fit:cover; border-radius:4px;">
              </td>
              <td class="table-name">{{ flor.nombre }}</td>
              <td>{{ flor.Categoria_flores?.nombre }}</td>
              <td>{{ flor.precio | currency:'MXN' }}</td>
              <td>{{ flor.descuento ? flor.descuento + '%' : '0%' }}</td>
              <td>
                <span class="status-badge" [ngClass]="{'active': flor.status === 'Activo', 'inactive': flor.status !== 'Activo'}">
                  {{ flor.status }}
                </span>
              </td>
            </tr>
            <tr *ngIf="flores.length === 0">
              <td colspan="6" class="text-center">No hay flores registradas.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>
</div>
